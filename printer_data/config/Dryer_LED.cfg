
[gcode_macro UPDATE_DRYER_HEATER_LED] 
gcode:
    {% set temp = printer["heater_generic Dryer_Heater"].temperature %}
    {% if temp < 40 %}
        # Cold (<40°C): Green or off
        SET_LED LED=Dryer_Heater_Neopixel INDEX=1 RED=0.2 GREEN=0.2 BLUE=0.2 WHITE=0.2
        SET_LED LED=Dryer_Heater_Neopixel INDEX=2 RED=0.2 GREEN=0.2 BLUE=0.2 WHITE=0.2
        SET_LED LED=Dryer_Heater_Neopixel INDEX=3 RED=0.2 GREEN=0.2 BLUE=0.2 WHITE=0.2
        SET_LED LED=Dryer_Heater_Neopixel INDEX=4 RED=0.2 GREEN=0.2 BLUE=0.2 WHITE=0.2
        # SET_LED LED=Screen_Colour RED=0.0 GREEN=0.2 BLUE=0.0 INDEX=26,27,28,29 TRANSMIT=1
    {% elif temp >= 40 and temp <= 60 %}
        # Warming (40–70°C): Yellow
        SET_LED LED=Dryer_Heater_Neopixel INDEX=1 RED=0 GREEN=0.1 BLUE=0 WHITE=0
        SET_LED LED=Dryer_Heater_Neopixel INDEX=2 RED=0 GREEN=0.1 BLUE=0 WHITE=0
        SET_LED LED=Dryer_Heater_Neopixel INDEX=3 RED=0 GREEN=0.1 BLUE=0 WHITE=0
        SET_LED LED=Dryer_Heater_Neopixel INDEX=4 RED=0 GREEN=0.1 BLUE=0 WHITE=0
    {% elif temp >= 60 and temp <= 80 %}
        # Warming (40–70°C): Yellow
        SET_LED LED=Dryer_Heater_Neopixel INDEX=1 RED=0.8 GREEN=0.5 BLUE=0 WHITE=0
        SET_LED LED=Dryer_Heater_Neopixel INDEX=2 RED=0.8 GREEN=0.5 BLUE=0 WHITE=0
        SET_LED LED=Dryer_Heater_Neopixel INDEX=3 RED=0.8 GREEN=0.5 BLUE=0 WHITE=0
        SET_LED LED=Dryer_Heater_Neopixel INDEX=4 RED=0.8 GREEN=0.5 BLUE=0 WHITE=0
        #SET_LED LED=Screen_Colour RED=1.0 GREEN=1.0 BLUE=0.0 INDEX=26,27,28,29 TRANSMIT=1
    {% elif temp >= 80 and temp <= 92 %}
        # Hot (>70°C): Red
        SET_LED LED=Dryer_Heater_Neopixel INDEX=1 RED=0.7 GREEN=0. BLUE=0 WHITE=0
        SET_LED LED=Dryer_Heater_Neopixel INDEX=2 RED=0.7 GREEN=0. BLUE=0 WHITE=0
        SET_LED LED=Dryer_Heater_Neopixel INDEX=3 RED=0.7 GREEN=0. BLUE=0 WHITE=0
        SET_LED LED=Dryer_Heater_Neopixel INDEX=4 RED=0.7 GREEN=0. BLUE=0 WHITE=0
        #SET_LED LED=Screen_Colour RED=1.0 GREEN=0.0 BLUE=0.0 INDEX=26,27,28,29 TRANSMIT=1
   {% else %} 
        SET_LED LED=Dryer_Heater_Neopixel INDEX=1 RED=0.7 GREEN=0. BLUE=0.7 WHITE=0
        SET_LED LED=Dryer_Heater_Neopixel INDEX=2 RED=0.7 GREEN=0. BLUE=0.7 WHITE=0
        SET_LED LED=Dryer_Heater_Neopixel INDEX=3 RED=0.7 GREEN=0. BLUE=0.7 WHITE=0
        SET_LED LED=Dryer_Heater_Neopixel INDEX=4 RED=0.7 GREEN=0. BLUE=0.7 WHITE=0
   {% endif %}

[delayed_gcode UPDATE_DRYER_HEATER_LED_LOOP]
initial_duration: 1
gcode:
    UPDATE_DRYER_HEATER_LED
    UPDATE_DELAYED_GCODE ID=UPDATE_DRYER_HEATER_LED_LOOP DURATION=5

