#### crowsnest.conf
#### This is a typical default config.
#### Also used as default in mainsail / MainsailOS
#### See:
#### https://github.com/mainsail-crew/crowsnest/blob/master/README.md
#### for details to configure to your needs.


#####################################################################
####                                                            #####
####      Information about ports and according URL's           #####
####                                                            #####
#####################################################################
####                                                            #####
####    Port 8080 equals /webcam/?action=[stream/snapshot]      #####
####    Port 8081 equals /webcam2/?action=[stream/snapshot]     #####
####    Port 8082 equals /webcam3/?action=[stream/snapshot]     #####
####    Port 8083 equals /webcam4/?action=[stream/snapshot]     #####
####                                                            #####
####    Note: These ports are default for most Mainsail         #####
####    installations. To use any other port would involve      #####
####    changing the proxy configuration or using directly      #####
####    http://<ip>:<port>/?action=[stream/snapshot]            #####
####                                                            #####
#####################################################################
####    RTSP Stream URL: ( if enabled and supported )           #####
####    rtsp://<ip>:<rtsp_port>/stream.h264                     #####
#####################################################################


[crowsnest]
log_path: ~/printer_data/logs/crowsnest.log
log_level: verbose                      # Valid Options are quiet/verbose/debug
delete_log: false                       # Deletes log on every restart, if set to true
no_proxy: false

[cam 1]
mode: ustreamer                         # ustreamer - Provides mjpg and snapshots. (All devices)
                                        # camera-streamer - Provides webrtc, mjpg and snapshots. (rpi + Raspi OS based only)
enable_rtsp: false                      # If camera-streamer is used, this enables also usage of an rtsp server
rtsp_port: 8554                         # Set different ports for each device!
port: 8080                              # HTTP/MJPG Stream/Snapshot Port
device: /dev/video0                     # See Log for available ...
resolution:800x480                      # 1280x720                    # widthxheight format
max_fps: 20                             # If Hardware Supports this it will be forced, otherwise ignored/coerced.
#custom_flags:                          # You can run the Stream Services with custom flags.
v4l2ctl: brightness=0,contrast=20,saturation=70,hue=0,white_balance_automatic=1,gamma=120,gain=15,power_line_frequency=2,sharpness=2,backlight_compensation=0
  # -c brightness=-20          # Slightly brighter for enclosure lighting -64 to 64
  # -c contrast=40            # Good contrast for seeing filament/layers 0 to 64
  # -c saturation=70          # Natural colors without oversaturation 0 to 128
  # -c hue=0                  # Keep neutral (default) -40 to 40
  # -c white_balance_automatic=0  # Manual WB for consistent color 1 on 0 off
  # -c white_balance_temperature=4000  # Warm light (typical enclosure LED) 72 to 500
  # -c gamma=120              # Slightly boosted midtones 72 to 500
  # -c gain=15                # Low noise in low light  0 to 100
  # -c power_line_frequency=2  # 60Hz (US) or change to 1 for 50Hz (EU)
  # -c sharpness=2            # Soft edges reduce compression artifacts 0 to 6
  # -c backlight_compensation=2  # Default, adjust if you have bright lights behind0 to 2


