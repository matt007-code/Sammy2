[mcu Dryer]
serial: /dev/serial/by-id/usb-Klipper_stm32f042x6_100012000E43323543323320-if00
restart_method: command

# # [output_pin mosfet0]
# # pin: expander:PA0
# # pwm: true
# # cycle_time: 0.010
# # value: 0
# # shutdown_value: 0

[heater_generic Dryer_Heater]
heater_pin:  Dryer:PA0
max_power: 0.80
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: Dryer:PA6
control: pid
pid_Kp: 13.288
pid_Ki: 0.348
pid_Kd: 127.034
min_temp: 5
max_temp: 115

[verify_heater Dryer_Heater]
max_error: 140
check_gain_time: 120
hysteresis: 5
heating_gain: 2

[heater_fan Dryer_Heater_Fan]
pin: Dryer:PA1
max_power: 1.0
shutdown_speed: 1
off_below: 0.2
heater: Dryer_Heater
heater_temp: 60
fan_speed: 0.80

[heater_fan Dryer_Extractor_Fan]
pin:Dryer:PA2
max_power: 1.0
shutdown_speed: 1.0
off_below: 0.2
heater: Dryer_Heater
heater_temp: 80
fan_speed: 1.0

