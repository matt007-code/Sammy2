# [temperature_sensor Chamber_Temp]
# sensor_type: NTC 100K MGB18-104F39050L32
# sensor_pin: expander:PA5
# min_temp: 5
# max_temp: 70

[temperature_sensor Dryer]
sensor_type: AHT10
i2c_mcu: Dryer
i2c_bus: i2c1a        # The hardware bus for J2 (PF0/PF1)
i2c_speed: 100000     # Force standard speed (100kHz)
i2c_address: 56


# [temperature_sensor Dryer]
# sensor_type: SHT3X
# # PIN SELECTIONS
# i2c_software_scl_pin: Dryer:PF1
# i2c_software_sda_pin: Dryer:PF0
# # BUS ADDRESS SELECTION
# i2c_address: 68
# #   Default is 56 (0x38). Some AHT10 sensors give the option to use
# #   57 (0x39) by moving a resistor.                       
# # SAMPLING INTERVAL
# #aht10_report_time: 30
# #   Interval in seconds between readings. Default is 30, minimum is 5
# i2c_speed: 100000

# # Status LED lights when klipper connects 
# [static_digital_output onboardLED]
# pins: !expander:PA4

[neopixel Dryer_Heater_Neopixel]
pin: Dryer:PB1
chain_count: 10
color_order: GRB
initial_RED: 0.2
initial_GREEN: 0.2
initial_BLUE: 0.2
initial_WHITE: 0.0



