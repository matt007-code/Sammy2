position_min: -5              
#position_endstop: 0
homing_speed: 15.0
homing_retract_dist: 5.0
homing_retract_speed: 15.0
second_homing_speed: 10.0

[tmc2209 stepper_z]
uart_pin: PE6 
interpolate: False             
run_current: 0.48           
#hold_current: 0.58         
sense_resistor: 0.150         
stealthchop_threshold: 0 #999999
uart_address:3

[stepper_z1] ##motherboard：Z1
