uart_pin: PB7
interpolate: False             
run_current: 1.061  #1.5              
#hold_current: 1.5             
sense_resistor: 0.150         
stealthchop_threshold: 0      
uart_address:3
driver_sgthrs: 75
diag_pin: PE13 

[stepper_z] #motherboard：Z3 
