[display_status]

[pause_resume]

[mcu]      
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_30FFDA053347543039611551-if00
restart_method: command     

[mcu extra_mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_30FF6E063130533523100343-if00
restart_method: command 

[adxl345]
cs_pin:extra_mcu:PB12

[resonance_tester]
accel_chip: adxl345
probe_points:
    175, 175, 30  # an example175 Y175 Z30
accel_per_hz:50
min_freq:1
max_freq:100
max_smoothing:0.2
hz_per_sec:0.5

[temperature_sensor mcu_temp]         
sensor_type: temperature_mcu
min_temp:0
max_temp:100

[temperature_sensor Host_temp]     
sensor_type: temperature_host
min_temp: 0
max_temp: 110

[temperature_sensor Toolhead_Temp]
sensor_type: temperature_mcu
sensor_mcu: extra_mcu

[printer]
kinematics: corexy           
max_velocity: 700          
max_accel: 8000            
minimum_cruise_ratio: 0.5   
max_z_velocity: 20           
max_z_accel: 500             
square_corner_velocity: 5

[input_shaper]
damping_ratio_x: 0.001
damping_ratio_y: 0.001
