[mcu expander]
serial: /dev/serial/by-id/usb-Klipper_stm32f042x6_2B0024001643305645303820-if00
restart_method: command

# [output_pin mosfet0]
# pin: expander:PA0
# pwm: true
# cycle_time: 0.010
# value: 0
# shutdown_value: 0

[heater_generic Chamber_Heater]
heater_pin:  expander:PA0
max_power: 0.75
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: expander:PA6
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114
min_temp: 5
max_temp: 95

# [output_pin mosfet1]
# pin: expander:PA1
# pwm: true
# cycle_time: 0.010
# value: 0
# shutdown_value: 0

[heater_fan Chamber_Heater_Fan]
pin: expander:PA1
max_power: 1.0
shutdown_speed: 1
heater: Chamber_Heater
heater_temp: 60
fan_speed: 0.80

[temperature_sensor Chamber]
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: expander:PA5
min_temp: 5
max_temp: 105

# [output_pin mosfet2]
# pin: expander:PA2
# pwm: true
# cycle_time: 0.010
# value: 0
# shutdown_value: 0

# [output_pin mosfet3]
# pin: expander:PA3
# pwm: true
# cycle_time: 0.010
# value: 0
# shutdown_value: 0

# Status LED lights when klipper connects 
[static_digital_output onboardLED]
pins: !expander:PA4

[neopixel Chamber_Heater_Neopixel]
pin: expander:PB1
chain_count: 4
color_order: GRB
initial_RED: 0.9
initial_GREEN: 0.0
initial_BLUE: 0.0

# Other Pins
# T0 = expander:PA6
# T1 = expander:PA5
# GPIO = expander:PA7

