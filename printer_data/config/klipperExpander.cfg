# max_power: 1.0
# shutdown_speed: 1
# off_below: 0.2
# heater: Chamber_Heater2
# heater_temp: 60
# fan_speed: 1.00

[output_pin DISABLE_CHAMBER_HEATER]
pin: expander:PA7

[temperature_sensor Chamber_Temp]
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: expander:PA5
min_temp: 5
max_temp: 70

# [temperature_sensor Chamber_Temp2]
# sensor_type: AHT10
# i2c_mcu: expander
# i2c_bus: i2c1a
# i2c_address: 56
# aht10_report_time: 30

[temperature_sensor Chamber_Temp2]
sensor_type: AHT10
# PIN SELECTIONS
i2c_software_scl_pin: expander:PF1
i2c_software_sda_pin: expander:PF0
# BUS ADDRESS SELECTION
i2c_address: 56
#   Default is 56 (0x38). Some AHT10 sensors give the option to use
#   57 (0x39) by moving a resistor.                       
# SAMPLING INTERVAL
aht10_report_time: 30
#   Interval in seconds between readings. Default is 30, minimum is 5

# Status LED lights when klipper connects 
[static_digital_output onboardLED]
pins: !expander:PA4

[neopixel Chamber_Heater_Neopixel]
pin: expander:PB1
chain_count: 4
color_order: GRB
initial_RED: 1.0
initial_GREEN: 0.0
initial_BLUE: 1.0
initial_WHITE: 0.0



